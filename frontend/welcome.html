<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bienvenida SGD · IA</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #000;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  width: 100vw;
}

/* ── CANVAS DE PARTÍCULAS ── */
#particles-canvas {
  position: fixed;
  inset: 0;
  z-index: 1;
}

/* ── GRADIENTE DE FONDO ANIMADO ── */
.bg-gradient {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 50%,
    #001233 0%, #000510 50%, #000 100%);
  animation: bgPulse 6s ease-in-out infinite;
}

@keyframes bgPulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.7; }
}

/* ── LUZ AZUL CENTRAL ── */
.center-glow {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle,
    rgba(37,99,235,0.15) 0%,
    rgba(37,99,235,0.05) 40%,
    transparent 70%);
  border-radius: 50%;
  z-index: 2;
  animation: glowPulse 4s ease-in-out infinite;
}

@keyframes glowPulse {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity:0.6; }
  50% { transform: translate(-50%,-50%) scale(1.2); opacity:1; }
}

/* ── LÍNEAS HORIZONTALES TIPO PS5 ── */
.scanlines {
  position: fixed;
  inset: 0;
  z-index: 3;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.01) 2px,
    rgba(255,255,255,0.01) 4px
  );
  pointer-events: none;
}

/* ── CONTENEDOR PRINCIPAL ── */
.welcome-container {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
}

/* ── LOGO ── */
.logo-wrap {
  opacity: 0;
  transform: scale(0.8);
  animation: logoReveal 1.2s cubic-bezier(0.34,1.3,0.64,1) 1.5s forwards;
  margin-bottom: 32px;
}

@keyframes logoReveal {
  to { opacity:1; transform:scale(1); }
}

.logo-icon {
  width: 90px; height: 90px;
  background: linear-gradient(135deg, #1e4d9e, #3b82f6);
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 38px;
  font-weight: 700;
  color: #fff;
  font-family: 'IBM Plex Mono', monospace;
  margin: 0 auto 20px;
  box-shadow:
    0 0 40px rgba(37,99,235,0.5),
    0 0 80px rgba(37,99,235,0.2),
    inset 0 1px 0 rgba(255,255,255,0.2);
  letter-spacing: -1px;
}

/* ── TÍTULO ── */
.welcome-title {
  opacity: 0;
  animation: fadeSlideUp 1s ease 2.4s forwards;
  text-align: center;
}

@keyframes fadeSlideUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

.welcome-title h1 {
  font-size: 48px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -2px;
  line-height: 1;
  margin-bottom: 8px;
}

.welcome-title h1 span {
  color: #3b82f6;
}

.welcome-title p {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 400;
}

/* ── SEPARADOR ── */
.divider {
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #3b82f6, #60a5fa, transparent);
  border-radius: 2px;
  margin: 28px auto;
  animation: dividerExpand 1s ease 3.2s forwards;
  opacity: 0;
}

@keyframes dividerExpand {
  from { width:0; opacity:0; }
  to   { width:280px; opacity:1; }
}

/* ── MENSAJE DE BIENVENIDA ── */
.welcome-msg {
  opacity: 0;
  animation: fadeSlideUp 0.8s ease 3.8s forwards;
  text-align: center;
}

.welcome-msg .user-greeting {
  font-size: 22px;
  font-weight: 300;
  color: rgba(255,255,255,0.9);
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.welcome-msg .user-greeting strong {
  font-weight: 700;
  color: #fff;
}

.welcome-msg .user-role {
  font-size: 12px;
  color: #3b82f6;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 600;
}

/* ── BARRA DE CARGA TIPO PS5 ── */
.loading-wrap {
  opacity: 0;
  animation: fadeSlideUp 0.8s ease 4.4s forwards;
  margin-top: 48px;
  text-align: center;
}

.loading-bar-bg {
  width: 280px;
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
  margin: 0 auto 12px;
}

.loading-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #1e4d9e, #3b82f6, #60a5fa);
  border-radius: 3px;
  animation: loadFill 2.5s cubic-bezier(0.4,0,0.2,1) 4.8s forwards;
  box-shadow: 0 0 10px rgba(59,130,246,0.8);
}

@keyframes loadFill {
  0%  { width:0%; }
  60% { width:75%; }
  80% { width:88%; }
  100%{ width:100%; }
}

.loading-text {
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: textBlink 1s ease 4.8s 3;
}

@keyframes textBlink {
  0%,100% { opacity:0.3; }
  50% { opacity:0.8; }
}

/* ── ANILLOS DECORATIVOS TIPO PS5 ── */
.ring {
  position: fixed;
  border-radius: 50%;
  border: 1px solid rgba(59,130,246,0.08);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: 2;
  animation: ringPulse 4s ease-in-out infinite;
}

.ring-1 { width:300px; height:300px; animation-delay:0s; }
.ring-2 { width:500px; height:500px; animation-delay:0.5s; border-color:rgba(59,130,246,0.05); }
.ring-3 { width:700px; height:700px; animation-delay:1s; border-color:rgba(59,130,246,0.03); }
.ring-4 { width:900px; height:900px; animation-delay:1.5s; border-color:rgba(59,130,246,0.02); }

@keyframes ringPulse {
  0%,100% { transform:translate(-50%,-50%) scale(1); opacity:0.5; }
  50% { transform:translate(-50%,-50%) scale(1.03); opacity:1; }
}

/* ── FADE OUT FINAL ── */
.welcome-container.fade-out {
  animation: fullFadeOut 0.8s ease forwards;
}

@keyframes fullFadeOut {
  to { opacity:0; pointer-events:none; }
}

#welcome-screen.hide {
  display: none;
}
</style>
</head>
<body>

<div id="welcome-screen">
  <div class="bg-gradient"></div>
  <canvas id="particles-canvas"></canvas>
  <div class="center-glow"></div>
  <div class="scanlines"></div>

  <!-- Anillos decorativos -->
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="ring ring-4"></div>

  <div class="welcome-container" id="welcome-container">

    <div class="logo-wrap">
      <div class="logo-icon">AI</div>
    </div>

    <div class="welcome-title">
      <h1>SGD · <span>IA</span></h1>
      <p>Sistema de Gestión Documental</p>
    </div>

    <div class="divider"></div>

    <div class="welcome-msg">
      <div class="user-greeting">Bienvenido, <strong id="welcome-username">Usuario</strong></div>
      <div class="user-role" id="welcome-role">Estándar</div>
    </div>

    <div class="loading-wrap">
      <div class="loading-bar-bg">
        <div class="loading-bar-fill"></div>
      </div>
      <div class="loading-text">Cargando sistema...</div>
    </div>

  </div>
</div>

<script>
// ── Partículas flotantes ──────────────────────────────────
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];
const PARTICLE_COUNT = 80;

for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    size: Math.random() * 2 + 0.5,
    opacity: Math.random() * 0.5 + 0.1,
    color: Math.random() > 0.6 ? '#3b82f6' : '#ffffff',
    pulse: Math.random() * Math.PI * 2,
    pulseSpeed: Math.random() * 0.02 + 0.01,
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.pulse += p.pulseSpeed;

    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;

    const currentOpacity = p.opacity * (0.6 + 0.4 * Math.sin(p.pulse));

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color.replace(')', `,${currentOpacity})`).replace('rgb', 'rgba').replace('#3b82f6', `rgba(59,130,246,${currentOpacity})`).replace('#ffffff', `rgba(255,255,255,${currentOpacity})`);
    ctx.fill();
  });

  // Líneas entre partículas cercanas
  particles.forEach((p1, i) => {
    particles.slice(i + 1).forEach(p2 => {
      const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
      if (dist < 100) {
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = `rgba(59,130,246,${0.06 * (1 - dist / 100)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    });
  });

  requestAnimationFrame(drawParticles);
}

drawParticles();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ── API de bienvenida ─────────────────────────────────────
function showWelcome(username, role) {
  document.getElementById('welcome-username').textContent = username;
  document.getElementById('welcome-role').textContent = role;

  // Después de que carga la barra → fade out y redirigir
  setTimeout(() => {
    const container = document.getElementById('welcome-container');
    container.classList.add('fade-out');
    setTimeout(() => {
      document.getElementById('welcome-screen').classList.add('hide');
      // Aquí llamas a enterApp() o lo que necesites después
      if (typeof onWelcomeDone === 'function') onWelcomeDone();
    }, 800);
  }, 7800);
}

// Auto-ejecutar si hay datos
window.addEventListener('load', () => {
  // Puedes cambiar estos valores dinámicamente
  const username = window.WELCOME_USERNAME || 'Administrador';
  const role     = window.WELCOME_ROLE     || 'Administrador';
  showWelcome(username, role);
});
</script>
</body>
</html>
